<style>
.quips-layout {
    display: flex;
    align-items: center;
    justify-content: center;
    max-width: 920px;
    margin: 0 auto;
    padding: 0 var(--space-md);
}

.logo-grid {
    flex: 1 1 auto;
    max-width: 800px;
    aspect-ratio: 1 / 1;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    gap: 3px;
    overflow: hidden;
}

.cell {
    border-radius: var(--border-radius);
    position: relative;
    overflow: hidden;
    min-width: 0;
}

.cell-on { background: #333333; }
.cell-off { background: transparent; }

.cell-link {
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 0.65rem;
    font-family: var(--font-mono);
    text-align: center;
    padding: var(--space-xs);
    line-height: 1.2;
    width: 100%;
    height: 100%;
    transition: color 0.2s;
}

.cell-on .cell-link { color: #555555; }
.cell-on .cell-link:hover { color: var(--color-accent); text-decoration: none; }

.cell-link span {
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: opacity 0.15s ease;
}

/* ── Track cells ─────────────────────────────────── */
.track-cell .cell-link {
    color: var(--color-text-secondary);
    cursor: pointer;
}

.track-cell .cell-link:hover {
    color: var(--color-accent);
    text-decoration: none;
}

/* ── Nav chevrons ────────────────────────────────── */
.nav-chevron {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    background: none;
    border: none;
    font-size: 0.8rem;
    color: #555;
    cursor: pointer;
    transition: color 0.2s;
    user-select: none;
    font-family: var(--font-mono);
    padding: 0;
}

.nav-chevron:hover { color: var(--color-accent); }
.nav-chevron:active { color: #fff; }

/* ── Inner Square ────────────────────────────────── */
.inner-square {
    grid-column: 3 / 7;
    grid-row: 3 / 7;
    background: #333333;
    border: 1px solid var(--color-border);
    border-radius: var(--border-radius);
    padding: var(--space-md);
    font-family: var(--font-sans);
    font-size: 0.8rem;
    color: var(--color-text-primary);
    line-height: 1.6;
    text-align: left;
    overflow: hidden;
    min-height: 0;
    min-width: 0;
}

.corner-pusher { float: right; width: 0; height: 75%; }
.corner-spacer { float: right; clear: right; width: 25%; height: 25%; }

.inner-square h2 {
    font-family: var(--font-mono);
    font-size: 0.9rem;
    color: var(--torus-color, #f0dfaf);
    margin-bottom: var(--space-sm);
}

.inner-square h2 a {
    color: var(--torus-color, #f0dfaf);
    text-decoration: none;
    transition: color 0.2s;
}

.inner-square h2 a:hover { color: var(--color-accent); }

.inner-square p {
    margin-bottom: var(--space-sm);
    font-size: 0.75rem;
    color: #dcdccc;
}

.inner-square p:last-child { margin-bottom: 0; }

.inner-square pre {
    background: #2a2a2a;
    border: 1px solid var(--color-border);
    border-radius: var(--border-radius);
    padding: var(--space-sm);
    font-family: var(--font-mono);
    font-size: 0.65rem;
    line-height: 1.5;
    color: #dcdccc;
    overflow-x: hidden;
    margin-bottom: var(--space-sm);
    white-space: pre-wrap;
    word-break: break-all;
}

.inner-square pre .comment { color: #7f9f7f; }
.inner-square pre .keyword { color: #f0dfaf; }
.inner-square pre .string { color: #cc9393; }
.inner-square pre .fn { color: #93e0e3; }

.inner-square ul {
    margin: 0 0 var(--space-sm) var(--space-md);
    padding: 0;
    font-size: 0.75rem;
    color: #dcdccc;
    line-height: 1.6;
}

.inner-square li { margin-bottom: 2px; }

.inner-square .quip-type {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: #7f9f7f;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 2px;
}

.inner-square.fading {
    opacity: 0;
    transition: opacity 0.15s ease-out;
}

.inner-square.visible {
    opacity: 1;
    transition: opacity 0.2s ease-in;
}

/* ── Pocket ──────────────────────────────────────── */
.pocket {
    grid-column: 6 / 8;
    grid-row: 6 / 8;
    background: var(--color-background, #3f3f3f);
    z-index: 1;
    border: 1px solid var(--color-border);
    border-radius: var(--border-radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--color-accent);
    text-align: center;
    padding: var(--space-sm);
    line-height: 1.4;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
    position: relative;
    overflow: hidden;
}

.pocket:hover {
    border-color: var(--color-accent);
    background: #353535;
}

.pocket:active { background: #2a2a2a; }

.pocket-text {
    position: relative;
    z-index: 1;
}

/* ── Layer minimap ──────────────────────────────── */
.layer-map {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-sm);
    margin-left: var(--space-lg);
    perspective: 300px;
}

.layer-map-scene {
    --ls: clamp(32px, 7vw, 48px);
    --lg: clamp(14px, 3vw, 22px);
    position: relative;
    width: var(--ls);
    height: var(--ls);
    transform-style: preserve-3d;
    transform: rotateX(55deg) rotateZ(-45deg);
}

.layer-map-level {
    position: absolute;
    top: 0; left: 0;
    width: var(--ls);
    height: var(--ls);
    transform: translateZ(calc(var(--z) * var(--lg)));
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 2px;
    cursor: pointer;
    transition: border-color 0.3s, box-shadow 0.3s;
    overflow: hidden;
}

.layer-map-level canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    opacity: 0.2;
    transition: opacity 0.3s;
}

.layer-map-level.active {
    border-color: var(--tc);
    box-shadow: 0 0 6px var(--tc);
}

.layer-map-level.active canvas { opacity: 0.85; }
.layer-map-level:hover:not(.active) canvas { opacity: 0.4; }
.layer-map-level:hover:not(.active) { border-color: rgba(255,255,255,0.2); }

.layer-map-name {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--color-text-secondary);
    letter-spacing: 0.05em;
    transition: color 0.3s;
}

/* ── Mobile ──────────────────────────────────────── */
@media (max-width: 640px) {
    .quips-layout {
        flex-direction: column;
        align-items: stretch;
        padding: 0 var(--space-sm);
    }
    .logo-grid {
        gap: 2px;
        width: 100%;
    }
    .cell-link {
        font-size: 0.55rem;
        padding: 2px;
    }
    .inner-square {
        padding: var(--space-sm);
    }
    .inner-square h2 { font-size: 0.75rem; }
    .inner-square p { font-size: 0.65rem; }
    .inner-square pre { font-size: 0.55rem; padding: 4px; }
    .inner-square ul { font-size: 0.65rem; margin-left: var(--space-sm); }
    .inner-square .quip-type { font-size: 0.5rem; }
    .pocket { font-size: 0.65rem; }
    .nav-chevron { font-size: 0.7rem; }
    .layer-map { perspective: none; margin-left: 0; align-self: center; }
    .layer-map-scene {
        transform: none;
        display: flex;
        gap: 6px;
        width: auto;
        height: auto;
    }
    .layer-map-level {
        position: relative;
        transform: none !important;
        width: 28px;
        height: 28px;
    }
    .layer-map-name { font-size: 0.6rem; }
}

/* ── Reduced motion ──────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
    .inner-square.fading,
    .inner-square.visible {
        transition: none;
    }
    .cell-link span {
        transition: none;
    }
    .layer-map-level,
    .layer-map-level canvas { transition: none; }
}
</style>

<script>
(function() {
    var LOGO = [
        0b11111111,
        0b10000001,
        0b10111101,
        0b10111101,
        0b10111111,
        0b10111001,
        0b10001001,
        0b11111111
    ];

    // ── Quips: 16 per torus (15 track + 1 active) ────
    var quips = [
        // ── Philosophy (16) ─────────────────────────────
        {
            id: 'sailboat', cycle: 'philosophy',
            title: 'the sailboat test',
            body: '<p>Hundred Rabbits live on a sailboat. 51-day Pacific crossings without reliable internet. Power budgets in solar watts.</p>' +
                  '<p>If a tool requires cloud APIs, constant connectivity, or more power than a solar panel provides \u2014 it doesn\'t work. It\'s not theoretical. It\'s Tuesday.</p>' +
                  '<p>Will this run in 50 years? Can I fix it myself? Does it need an empire to maintain?</p>',
            pocket: 'those should work on a boat',
            source: '/sailboat-test/'
        },
        {
            id: 'removal', cycle: 'philosophy',
            title: 'remove to optimize',
            body: '<p>The fastest code is code that doesn\'t run. The most reliable system is the one with fewer parts. The best optimization is deletion.</p>' +
                  '<p>Before you profile, before you cache, before you parallelize \u2014 ask: does this need to exist at all?</p>' +
                  '<p>Removing unnecessary work beats optimizing it. Every time.</p>',
            pocket: 'what can you delete?',
            source: '/optimization-through-removal/'
        },
        {
            id: 'attention', cycle: 'philosophy',
            title: 'managing attention',
            body: '<p>Attention is the actual currency. Not time \u2014 you can\'t save time. But you can direct attention.</p>' +
                  '<p>Every notification is a withdrawal. Every context switch is a tax. The inbox is a todo list that other people write for you.</p>' +
                  '<p>Be present. Make a choice. Live with intent.</p>',
            pocket: 'where are you looking?',
            source: '/managing-attention/'
        },
        {
            id: 'spite', cycle: 'philosophy',
            title: 'learning to spite',
            body: '<p>The dysfunction becomes data. The suffering becomes a case study. The terrible job becomes the clearest lesson in what not to build.</p>' +
                  '<p>Spite is underrated as a motivator. Not the petty kind \u2014 the kind that says: I will build the thing that should have existed.</p>' +
                  '<p>Channel it. Make it productive. Then ship it.</p>',
            pocket: 'ship it anyway',
            source: '/learning-to-spite/'
        },
        {
            id: 'honesty', cycle: 'philosophy',
            title: 'economic honesty',
            body: '<p>This is all insane but I have a mortgage. That\'s the honest version. The dishonest version has mission statements and core values and a ping pong table.</p>' +
                  '<p>Most tech work exists to extract value, not create it. The question isn\'t whether you\'re complicit \u2014 you are. The question is what you do with the rest of your hours.</p>',
            pocket: 'what\'s the honest version?',
            source: '/economic-honesty/'
        },
        {
            id: 'koan', cycle: 'philosophy',
            title: 'the recursive koan',
            type: 'koan',
            body: '<p>A student asked the master: "What is the best software architecture?"</p>' +
                  '<p>The master pointed at the logo on the screen \u2014 an 8\u00d78 grid with a pocket in the corner.</p>' +
                  '<p>"What do you see in the pocket?" asked the master.</p>' +
                  '<p>"Another grid," said the student.</p>' +
                  '<p>"And in that grid\'s pocket?"</p>' +
                  '<p>The student was enlightened.</p>',
            pocket: 'look deeper',
            source: '/logo-design/'
        },
        {
            id: 'convergent', cycle: 'philosophy',
            title: 'convergent evolution',
            body: '<p>Everyone building personal AI systems independently arrives at the same patterns. Not because they\'re copying each other \u2014 because the constraints are the design.</p>' +
                  '<p>When the problem space is "make a useful thing with limited resources," convergence is inevitable.</p>',
            pocket: 'same shape, different soil',
            source: '/convergent-evolution-personal-ai/'
        },
        {
            id: 'deslopping', cycle: 'philosophy',
            title: 'de-slopping',
            body: '<p>AI-generated text has a smell. Confident, comprehensive, substanceless. The antidote isn\'t avoiding AI \u2014 it\'s developing taste strong enough to catch the slop before it ships.</p>' +
                  '<p>Editorial instinct is the new literacy.</p>',
            pocket: 'does this smell?',
            source: '/antislop-editorial/'
        },
        {
            id: 'deepend', cycle: 'philosophy',
            title: 'off the deep end',
            body: '<p>Sometimes the only way to learn is to build something unreasonable. The project that makes people ask "why?" is the one that teaches you the most.</p>' +
                  '<p>Reasonable projects produce reasonable skills. Unreasonable ones produce understanding.</p>',
            pocket: 'why not?',
            source: '/off-the-deep-end/'
        },
        {
            id: 'treadmill', cycle: 'philosophy',
            title: 'cloud treadmill',
            body: '<p>Every cloud AI upgrade resets the treadmill. You optimize for GPT-4, then GPT-5 drops and your prompts need reworking. The only stable foundation is the one you control.</p>' +
                  '<p>Run faster or step off.</p>',
            pocket: 'running in place',
            source: '/cloud-ai-treadmill/'
        },
        {
            id: 'gradient', cycle: 'philosophy',
            title: 'gradient descent',
            body: '<p>Your taste descends the gradient toward what you actually care about. Every creative choice is a step. The hits aren\'t random \u2014 they\'re convergent.</p>' +
                  '<p>Follow the loss function of your own dissatisfaction.</p>',
            pocket: 'follow the slope',
            source: '/greatest-hits-through-gradient-descent/'
        },
        {
            id: 'disassemble', cycle: 'philosophy',
            title: 'disassemble',
            body: '<p>Take the good thing apart. See how it works. Put it back together wrong on purpose. Now you understand it.</p>' +
                  '<p>Disassembly is the fastest path to literacy. Recombination is the fastest path to originality.</p>',
            pocket: 'break it to learn it',
            source: '/disassemble-recombine/'
        },
        {
            id: 'mirror', cycle: 'philosophy',
            title: 'recursive mirror',
            body: '<p>A mirror reflecting a mirror. Recursion isn\'t just a programming trick \u2014 it\'s a structure of thought. The logo contains itself. The method describes itself.</p>' +
                  '<p>The interesting things happen at the base case.</p>',
            pocket: 'look again',
            source: '/recursive-mirror/'
        },
        {
            id: 'thinking', cycle: 'philosophy',
            title: 'what thinking looks like',
            body: '<p>What does thinking actually look like? Not the romanticized version. Staring at a wall. Deleting paragraphs. Rewriting the same function three times. Walking away.</p>' +
                  '<p>The output is clean. The process is not.</p>',
            pocket: 'the real version',
            source: '/what-does-thinking-look-like/'
        },
        {
            id: 'powers', cycle: 'philosophy',
            title: 'powers for good',
            body: '<p>You have technical skills. The world has problems. The gap between them is smaller than you think.</p>' +
                  '<p>But closing it requires choosing to aim, not just to build. Building without aiming is just exercise.</p>',
            pocket: 'aim it',
            source: '/powers-for-good/'
        },
        {
            id: 'workshop', cycle: 'philosophy',
            title: 'living workshop',
            body: '<p>The workspace is never finished. The tools change, the process changes, the person changes. Treating your practice as a living workshop means nothing is sacred except the work itself.</p>' +
                  '<p>Optimize for change, not for comfort.</p>',
            pocket: 'always rearranging',
            source: '/living-workshop/'
        },
        // ── Craft (16) ──────────────────────────────────
        {
            id: 'cli', cycle: 'craft',
            title: 'CLI-first',
            body: '<p>A GUI is a conclusion. A CLI is a conversation. One gives you answers; the other gives you vocabulary.</p>' +
                  '<p>Pipes, redirects, scripts \u2014 the shell composes. Every tool becomes a building block. The mouse clicks one thing at a time. The keyboard builds pipelines.</p>' +
                  '<p>When you work CLI-first, you can explain exactly what you did. Try that with 47 clicks.</p>',
            pocket: 'pipe it forward',
            source: '/cli-first-development/'
        },
        {
            id: 'pipe', cycle: 'craft',
            title: 'the pipeline',
            type: 'code',
            body: '<div class="quip-type">shell</div>' +
                  '<pre><span class="comment"># find the 10 largest node_modules</span>\nfind . -name node_modules \\\n  -type d -prune \\\n  | xargs du -sh \\\n  | sort -rh \\\n  | head -10</pre>' +
                  '<p>Six commands. No GUI. Composable, repeatable, scriptable. Each line does one thing.</p>',
            pocket: 'pipe it',
            source: '/cli-first-development/'
        },
        {
            id: 'css-trick', cycle: 'craft',
            title: 'the L-shape trick',
            type: 'code',
            body: '<div class="quip-type">css</div>' +
                  '<pre><span class="comment">/* float-based L-wrap */</span>\n<span class="keyword">.pusher</span> {\n  <span class="fn">float</span>: right;\n  width: 0;\n  height: 50%;\n}\n<span class="keyword">.spacer</span> {\n  <span class="fn">float</span>: right;\n  <span class="fn">clear</span>: right;\n  width: 25%; height: 50%;\n}</pre>' +
                  '<p>No clip-path. No JS. Just two invisible floats that carve an L-shaped text region.</p>',
            pocket: 'how it works',
            source: '/logo-design/'
        },
        {
            id: 'stack', cycle: 'craft',
            title: 'the stack',
            type: 'list',
            body: '<div class="quip-type">tools</div><ul><li>neovim \u2014 think in text</li><li>tmux \u2014 session as workspace</li><li>zsh + fzf \u2014 fuzzy everything</li><li>git \u2014 time travel</li><li>ripgrep \u2014 find it now</li><li>jq \u2014 json surgery</li><li>ssh \u2014 be anywhere</li></ul>' +
                  '<p>Seven tools. All CLI. All composable. All work on a sailboat.</p>',
            pocket: 'what\'s yours?',
            source: '/cli-tooling-stack/'
        },
        { id: 'claw', cycle: 'craft', title: 'hack my claw', body: '<p>An arcade claw machine runs on a microcontroller. The microcontroller runs on firmware. The firmware has assumptions.</p><p>Every assumption is a surface. Every surface is an invitation.</p>', pocket: 'grab it', source: '/hack-my-claw/' },
        { id: 'steampunk', cycle: 'craft', title: 'steampunk engineering', body: '<p>Modern infrastructure running on Raspberry Pis. Not because it\'s optimal \u2014 because it\'s sufficient. Constraints breed creativity when you stop fighting them.</p><p>Overprovisioning is the opposite of engineering.</p>', pocket: 'sufficient is enough', source: '/steampunk-engineering/' },
        { id: 'spinner', cycle: 'craft', title: '250MB spinner', body: '<p>A loading spinner shouldn\'t need 250 megabytes of node_modules. But here we are.</p><p>The gap between what we need and what we ship is the entire problem. Somewhere between "hello world" and production, we lost the plot.</p>', pocket: 'still loading', source: '/250mb-spinner/' },
        { id: 'itsmash', cycle: 'craft', title: 'it-smash', body: '<p>Sometimes the correct debugging strategy is percussive maintenance. Not on the hardware \u2014 on the assumptions.</p><p>When the elegant approach fails, try the obvious one. Then try the stupid one. One of them works.</p>', pocket: 'hit it again', source: '/it-smash/' },
        { id: 'keys58', cycle: 'craft', title: '58 keys', body: '<p>58 keys is enough. Then one more for the thing you can\'t live without.</p><p>Constraints on input force clarity of thought. A split keyboard is a conversation with your own ergonomics. Every key earns its position.</p>', pocket: 'one more', source: '/58-keys-then-1/' },
        { id: 'dbfirst', cycle: 'craft', title: 'db-first debug', body: '<p>Skip the logs. Skip the stack trace. Open the database. The data doesn\'t lie, and it doesn\'t have opinions about what went wrong.</p><p>Start from the truth and work backward.</p>', pocket: 'check the data', source: '/database-first-debugging/' },
        { id: 'nixos', cycle: 'craft', title: 'NixOS', body: '<p>A declarative operating system. Your entire machine described in a file. Reproducible, version-controlled, and terrifying the first time you break it.</p><p>After that, it\'s just configuration.</p>', pocket: 'it\'s just a file', source: '/nixos-on-framework/' },
        { id: 'overnight', cycle: 'craft', title: 'overnight AI', body: '<p>Ship the prompt at 6pm. Wake up to results at 6am. The overnight batch is back, and this time it can think.</p><p>The best use of AI is the one that doesn\'t need you awake.</p>', pocket: 'let it cook', source: '/overnight-ai-development/' },
        { id: 'distill', cycle: 'craft', title: 'distilling style', body: '<p>Style isn\'t what you add. It\'s what survives removal. Keep cutting until only the essential remains.</p><p>That residue is your voice. Everything else was noise you mistook for personality.</p>', pocket: 'keep cutting', source: '/distilling-style/' },
        { id: 'logodesign', cycle: 'craft', title: 'logo design', body: '<p>An 8\u00d78 grid. A frame, an inner square, a pocket. The constraint of 64 bits is the design.</p><p>The pocket makes it recursive. The recursion makes it a logo. The logo makes it a layout.</p>', pocket: '64 bits', source: '/logo-design/' },
        { id: 'simp', cycle: 'craft', title: 'SIMP protocol', body: '<p>Simple Internet Message Protocol. Because sometimes the right answer to "how should services talk?" is "as simply as possible."</p><p>Every layer of abstraction is a layer of liability.</p>', pocket: 'keep it simple', source: '/simp-protocol/' },
        { id: 'hyperresponder', cycle: 'craft', title: 'hyperresponder', body: '<p>An AI that responds faster than you can think of the next question. The bottleneck shifts from the machine to you.</p><p>When the tool is instant, the limiting factor is knowing what to ask.</p>', pocket: 'ask faster', source: '/ai-hyperresponder/' },
        // ── Play (16) ───────────────────────────────────
        { id: 'qubiq', cycle: 'play', title: 'QUBIQ', body: '<p>A puzzle where the goal is the puzzle. Rotate, align, solve \u2014 or just watch the geometry do its thing.</p><p>Some toys teach you more than tools do.</p>', pocket: 'twist it', source: '/fun/qubiq/' },
        { id: 'boids', cycle: 'play', title: 'boids', body: '<p>Three rules. Separation, alignment, cohesion. From these, flocking emerges.</p><p>Complexity from simplicity, every time. No bird knows the shape of the flock.</p>', pocket: 'flock together', source: '/fun/boids/' },
        { id: 'life', cycle: 'play', title: 'game of life', body: '<p>Conway\'s cellular automaton. Simple rules, infinite complexity. Gliders, oscillators, still lifes \u2014 a universe in a grid.</p><p>Proof that emergence doesn\'t need permission.</p>', pocket: 'it\'s alive', source: '/fun/game-of-life/' },
        { id: 'attractors', cycle: 'play', title: 'attractors', body: '<p>Strange attractors trace paths through chaos. Deterministic but unpredictable. The Lorenz butterfly, the R\u00f6ssler spiral.</p><p>Order hiding inside disorder, drawn one point at a time.</p>', pocket: 'fall into it', source: '/fun/attractors/' },
        { id: 'mandelbrot', cycle: 'play', title: 'mandelbrot', body: '<p>Infinite complexity from z\u00b2 + c. Zoom in forever. The boundary between order and chaos is infinitely detailed.</p><p>The simplest formula with the most interesting edge.</p>', pocket: 'zoom in', source: '/fun/mandelbrot/' },
        { id: 'flowfield', cycle: 'play', title: 'flowfield', body: '<p>Particles following invisible currents. Perlin noise gives the field. The particles reveal the flow.</p><p>The structure was always there. You just needed something to trace it.</p>', pocket: 'go with it', source: '/fun/flowfield/' },
        { id: 'wavetank', cycle: 'play', title: 'wave tank', body: '<p>Ripples, reflections, interference patterns. A 2D wave simulation in a sandbox.</p><p>Drop a stone and watch. Physics doesn\'t need your approval.</p>', pocket: 'make waves', source: '/fun/wave-tank/' },
        { id: 'asciilogo', cycle: 'play', title: 'ascii logo', body: '<p>The qry logo rendered in ASCII art. Because every medium deserves its own interpretation of the same 64 bits.</p><p>The constraint is the same. The expression changes.</p>', pocket: 'text mode', source: '/fun/ascii-logo/' },
        { id: 'logomath', cycle: 'play', title: 'logo math', body: '<p>The mathematics behind an 8\u00d78 grid. Bit operations, symmetry groups, and the geometry of a pocket.</p><p>Every pixel is a decision. 64 decisions make a logo.</p>', pocket: 'do the math', source: '/fun/logo-math/' },
        { id: 'ditherpunk', cycle: 'play', title: 'ditherpunk', body: '<p>Reducing images to 1-bit with style. Floyd-Steinberg, ordered dither, blue noise \u2014 each algorithm has a personality.</p><p>Fewer colors, more character.</p>', pocket: '1-bit vibes', source: '/fun/ditherpunk/' },
        { id: 'lenia', cycle: 'play', title: 'lenia', body: '<p>Continuous cellular automata. Life, but smooth. Creatures emerge, glide, reproduce, and die in a differentiable universe.</p><p>What happens when you remove the grid from Game of Life.</p>', pocket: 'soft life', source: '/fun/lenia/' },
        { id: 'lsystems', cycle: 'play', title: 'L-systems', body: '<p>Lindenmayer systems: recursive string rewriting that grows plants, fractals, and impossibly detailed geometry from tiny axioms.</p><p>The seed contains the forest.</p>', pocket: 'grow it', source: '/fun/l-systems/' },
        { id: 'maze', cycle: 'play', title: 'maze', body: '<p>Generate, solve, animate. Every maze algorithm has a bias \u2014 some make long corridors, some make rooms, some make art.</p><p>The algorithm is the aesthetic.</p>', pocket: 'find the way', source: '/fun/maze/' },
        { id: 'sorting', cycle: 'play', title: 'sorting', body: '<p>Watching algorithms sort is hypnotic. Bubble sort\'s patience. Quicksort\'s aggression. Merge sort\'s quiet competence.</p><p>Every algorithm is a personality.</p>', pocket: 'in order', source: '/fun/sorting/' },
        { id: 'turtle', cycle: 'play', title: 'turtle', body: '<p>Logo\'s turtle graphics, reborn. Forward, turn, pen up, pen down. Draw anything with four commands.</p><p>The simplest drawing tool is also the most expressive.</p>', pocket: 'forward 10', source: '/fun/turtle/' },
        { id: 'musicbox', cycle: 'play', title: 'music box', body: '<p>A sequencer in the browser. Place notes on a grid, hit play, hear patterns emerge. Music is just data with timing.</p><p>The grid is the instrument. The constraint is the composition.</p>', pocket: 'press play', source: '/fun/music-box/' }
    ];

    // ── Articles for dispersed dark edge cells ────────
    var articles = [
        { t: 'sailboat test', u: '/sailboat-test/' },
        { t: 'CLI-first', u: '/cli-first-development/' },
        { t: 'hack my claw', u: '/hack-my-claw/' },
        { t: 'errata', u: '/errata/' },
        { t: 'logo design', u: '/logo-design/' },
        { t: 'convergent evolution', u: '/convergent-evolution-personal-ai/' },
        { t: 'de-slopping', u: '/antislop-editorial/' },
        { t: 'steampunk eng.', u: '/steampunk-engineering/' },
        { t: '250MB spinner', u: '/250mb-spinner/' },
        { t: 'SIMP protocol', u: '/simp-protocol/' },
        { t: 'it-smash', u: '/it-smash/' },
        { t: 'styleguide', u: '/styleguide/' },
        { t: '58 keys', u: '/58-keys-then-1/' },
        { t: 'hyperresponder', u: '/ai-hyperresponder/' },
        { t: 'atkinson', u: '/atkinson-hyperlegible/' },
        { t: 'CLI stack', u: '/cli-tooling-stack/' },
        { t: 'cloud treadmill', u: '/cloud-ai-treadmill/' },
        { t: 'db-first debug', u: '/database-first-debugging/' },
        { t: 'disassemble', u: '/disassemble-recombine/' },
        { t: 'distilling style', u: '/distilling-style/' },
        { t: 'doug demon', u: '/doug-demon-core/' },
        { t: 'economic honesty', u: '/economic-honesty/' },
        { t: 'gradient descent', u: '/greatest-hits-through-gradient-descent/' },
        { t: 'write a zine', u: '/how-to-write-a-zine/' },
        { t: 'learning to spite', u: '/learning-to-spite/' },
        { t: 'lily58 gaming', u: '/lily58-gaming/' },
        { t: 'living workshop', u: '/living-workshop/' },
        { t: 'local AI econ', u: '/local-ai-economics/' },
        { t: 'managing attention', u: '/managing-attention/' },
        { t: 'RPi digest', u: '/minimal-steampunk-poc/' },
        { t: 'NixOS', u: '/nixos-on-framework/' },
        { t: 'off the deep end', u: '/off-the-deep-end/' },
        { t: 'remove to optimize', u: '/optimization-through-removal/' },
        { t: 'overnight AI', u: '/overnight-ai-development/' },
        { t: 'panopticron', u: '/panopticron/' },
        { t: 'microstudio', u: '/permacomputing-microstudio/' },
        { t: 'powers for good', u: '/powers-for-good/' },
        { t: 'productivity', u: '/productivity-breakthrough/' },
        { t: 'qrazy', u: '/qrazy/' },
        { t: 'recursive mirror', u: '/recursive-mirror/' },
        { t: 'slopsquid', u: '/slopsquid-technical-preset/' },
        { t: 'brainfarts', u: '/social-media-brainfarts/' },
        { t: 'UX challenges', u: '/ux-challenges/' },
        { t: 'thinking', u: '/what-does-thinking-look-like/' },
        { t: 'what I can do', u: '/what-i-can-actually-do/' },
        { t: 'zenburn', u: '/zenburn-theme/' },
        { t: 'about', u: '/about/' },
        { t: 'QUBIQ', u: '/fun/qubiq/' },
        { t: 'boids', u: '/fun/boids/' },
        { t: 'game of life', u: '/fun/game-of-life/' },
        { t: 'attractors', u: '/fun/attractors/' },
        { t: 'mandelbrot', u: '/fun/mandelbrot/' },
        { t: 'flowfield', u: '/fun/flowfield/' },
        { t: 'wave tank', u: '/fun/wave-tank/' },
        { t: 'ascii logo', u: '/fun/ascii-logo/' },
        { t: 'logo math', u: '/fun/logo-math/' },
        { t: 'ditherpunk', u: '/fun/ditherpunk/' },
        { t: 'lenia', u: '/fun/lenia/' },
        { t: 'L-systems', u: '/fun/l-systems/' },
        { t: 'maze', u: '/fun/maze/' },
        { t: 'sorting', u: '/fun/sorting/' },
        { t: 'turtle', u: '/fun/turtle/' },
        { t: 'music box', u: '/fun/music-box/' }
    ];

    // ── Build toruses ─────────────────────────────────
    var toruses = {};
    quips.forEach(function(q) {
        if (!toruses[q.cycle]) toruses[q.cycle] = [];
        toruses[q.cycle].push(q);
    });
    var torusKeys = Object.keys(toruses);

    // ── Word count for mobile ─────────────────────────
    var tmpDiv = document.createElement('div');
    quips.forEach(function(q) {
        tmpDiv.innerHTML = q.body;
        q.words = (tmpDiv.textContent || '').trim().split(/\s+/).length;
    });

    // ── State ─────────────────────────────────────────
    var currentCycle = torusKeys[0];
    var currentIndex = 0;
    var wildcardQuip = null;
    var pocketHovered = false;
    var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var mobileQuery = window.matchMedia('(max-width: 640px)');
    var torusColors = { philosophy: '#f0dfaf', craft: '#8cd0d3', play: '#dc8cc3' };

    // ── Read hash state ───────────────────────────────
    function readHash() {
        var hash = location.hash.slice(1);
        if (!hash) return;
        var parts = hash.split(':');
        if (parts.length === 2 && toruses[parts[0]]) {
            currentCycle = parts[0];
            var idx = parseInt(parts[1]);
            if (!isNaN(idx) && idx >= 0 && idx < toruses[currentCycle].length) {
                currentIndex = idx;
            }
        }
    }

    function updateHash() {
        history.replaceState(null, '', '#' + currentCycle + ':' + currentIndex);
    }

    readHash();

    // ── Cell sets ─────────────────────────────────────
    var innerCells = new Set();
    for (var r = 2; r <= 5; r++)
        for (var c = 2; c <= 5; c++)
            if (!(r === 5 && c === 5)) innerCells.add(r + ',' + c);
    var pocketCells = new Set(['5,5', '5,6', '6,5', '6,6']);
    var navPositions = { '4,6': 'up', '6,4': 'left' };
    var claimed = new Set([...innerCells, ...pocketCells, '4,6', '6,4']);

    // Counter-clockwise track order
    var trackPath = [
        '3,6', '2,6', '1,6', '1,5', '1,4', '1,3', '1,2', '1,1',
        '2,1', '3,1', '4,1', '5,1', '6,1', '6,2', '6,3'
    ];
    var trackIndexMap = {};
    trackPath.forEach(function(key, i) { trackIndexMap[key] = i; });

    // ── Helpers ───────────────────────────────────────
    function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
        }
        return a;
    }

    function getCurrentQuip() {
        return toruses[currentCycle][currentIndex];
    }

    function pickWildcard() {
        var otherCycles = torusKeys.filter(function(k) { return k !== currentCycle; });
        if (otherCycles.length === 0) {
            var pool = quips.filter(function(q) { return q !== getCurrentQuip(); });
            return pool[Math.floor(Math.random() * pool.length)] || quips[0];
        }
        var cycle = otherCycles[Math.floor(Math.random() * otherCycles.length)];
        var pool = toruses[cycle];
        return pool[Math.floor(Math.random() * pool.length)];
    }

    function getTrackLabel(quip) {
        return mobileQuery.matches ? String(quip.words) : quip.title;
    }

    function getEdgeLabel(article) {
        return mobileQuery.matches ? String(article.t.length) : article.t;
    }

    // ── DOM refs ──────────────────────────────────────
    var grid = document.getElementById('logoGrid');
    var innerEl, pocketTextEl;
    var trackCells = [];
    var edgeCells = [];
    var currentEdgeArticles = [];
    var mapLevels = {};
    var layerNameEl;

    // ── Minimap ─────────────────────────────────────
    function createLogoCanvas(color) {
        var c = document.createElement('canvas');
        c.width = 8; c.height = 8;
        var ctx = c.getContext('2d');
        for (var r = 0; r < 8; r++)
            for (var col = 0; col < 8; col++)
                if ((LOGO[r] >> (7 - col)) & 1) {
                    ctx.fillStyle = color;
                    ctx.fillRect(col, r, 1, 1);
                }
        return c;
    }

    function buildMinimap() {
        var map = document.getElementById('layerMap');
        var scene = document.createElement('div');
        scene.className = 'layer-map-scene';

        torusKeys.forEach(function(key, i) {
            var level = document.createElement('div');
            level.className = 'layer-map-level';
            level.style.setProperty('--z', i);
            level.dataset.torus = key;
            level.title = key;
            level.style.setProperty('--tc', torusColors[key] || '#888');
            level.appendChild(createLogoCanvas(torusColors[key] || '#888'));

            level.addEventListener('click', function() {
                if (key === currentCycle) return;
                currentCycle = key;
                currentIndex = 0;
                wildcardQuip = pickWildcard();
                updateDisplay();
            });

            mapLevels[key] = level;
            scene.appendChild(level);
        });

        map.appendChild(scene);

        layerNameEl = document.createElement('div');
        layerNameEl.className = 'layer-map-name';
        map.appendChild(layerNameEl);

        updateMinimap();
    }

    function updateMinimap() {
        torusKeys.forEach(function(key) {
            mapLevels[key].classList.toggle('active', key === currentCycle);
        });
        if (layerNameEl) {
            layerNameEl.textContent = currentCycle;
            layerNameEl.style.color = torusColors[currentCycle];
        }
    }

    function renderQuipContent(el, quip) {
        el.innerHTML = '<div class="corner-pusher"></div>' +
            '<div class="corner-spacer"></div>' +
            (quip.type ? '<div class="quip-type">' + quip.type + '</div>' : '') +
            '<h2><a href="' + quip.source + '">' + quip.title + '</a></h2>' +
            quip.body;
    }

    function updateTrackContent() {
        var pool = toruses[currentCycle];
        var N = pool.length;
        trackCells.forEach(function(tc, i) {
            var itemIdx = (currentIndex + 1 + i) % N;
            tc.span.textContent = getTrackLabel(pool[itemIdx]);
        });
    }

    function updateEdges() {
        currentEdgeArticles = shuffle(articles);
        edgeCells.forEach(function(cell, i) {
            var link = cell.querySelector('.cell-link');
            if (link && i < currentEdgeArticles.length) {
                link.href = currentEdgeArticles[i].u;
                link.querySelector('span').textContent = getEdgeLabel(currentEdgeArticles[i]);
            }
        });
    }

    function updatePocket() {
        if (pocketHovered) {
            pocketTextEl.textContent = '\u2192 ' + wildcardQuip.title;
        } else {
            pocketTextEl.textContent = wildcardQuip.pocket;
        }
    }

    function updateDisplay() {
        var delay = reducedMotion ? 0 : 150;

        // Fade out inner + track
        innerEl.classList.remove('visible');
        innerEl.classList.add('fading');
        if (!reducedMotion) {
            trackCells.forEach(function(tc) { tc.span.style.opacity = '0'; });
        }

        setTimeout(function() {
            innerEl.style.setProperty('--torus-color', torusColors[currentCycle]);
            renderQuipContent(innerEl, getCurrentQuip());
            updateTrackContent();
            updatePocket();
            updateEdges();
            updateHash();
            updateMinimap();

            innerEl.classList.remove('fading');
            innerEl.classList.add('visible');
            if (!reducedMotion) {
                trackCells.forEach(function(tc) { tc.span.style.opacity = ''; });
            }
        }, delay);
    }

    // ── Build grid (once) ─────────────────────────────
    function buildGrid() {
        grid.innerHTML = '';
        trackCells = new Array(trackPath.length);
        edgeCells.length = 0;
        wildcardQuip = pickWildcard();

        currentEdgeArticles = shuffle(articles);
        var edgeIdx = 0;
        var innerInserted = false;
        var pocketInserted = false;

        for (var y = 0; y < 8; y++) {
            for (var x = 0; x < 8; x++) {
                var key = y + ',' + x;

                if (innerCells.has(key) && !innerInserted) {
                    innerEl = document.createElement('div');
                    innerEl.className = 'inner-square visible';
                    innerEl.style.setProperty('--torus-color', torusColors[currentCycle]);
                    renderQuipContent(innerEl, getCurrentQuip());
                    grid.appendChild(innerEl);
                    innerInserted = true;
                    continue;
                }

                if (pocketCells.has(key) && !pocketInserted) {
                    var pocketEl = document.createElement('div');
                    pocketEl.className = 'pocket';

                    pocketTextEl = document.createElement('span');
                    pocketTextEl.className = 'pocket-text';
                    pocketTextEl.textContent = wildcardQuip.pocket;
                    pocketEl.appendChild(pocketTextEl);

                    pocketEl.addEventListener('click', escapeToWildcard);
                    pocketEl.addEventListener('mouseenter', function() {
                        pocketHovered = true;
                        pocketTextEl.textContent = '\u2192 ' + wildcardQuip.title;
                    });
                    pocketEl.addEventListener('mouseleave', function() {
                        pocketHovered = false;
                        pocketTextEl.textContent = wildcardQuip.pocket;
                    });
                    grid.appendChild(pocketEl);
                    pocketInserted = true;
                    continue;
                }

                if (navPositions[key]) {
                    var navType = navPositions[key];
                    var cell = document.createElement('div');
                    cell.className = 'cell cell-on';
                    var btn = document.createElement('button');
                    btn.className = 'nav-chevron';
                    btn.textContent = navType === 'up' ? '\u25b2' : '\u25c0';
                    btn.setAttribute('aria-label', navType === 'up' ? 'Next quip' : 'Previous quip');
                    btn.addEventListener('click', navType === 'up' ? cycleNext : cyclePrev);
                    cell.appendChild(btn);
                    grid.appendChild(cell);
                    continue;
                }

                if (claimed.has(key)) continue;

                var bit = (LOGO[y] >> (7 - x)) & 1;

                if (bit === 0) {
                    var cell = document.createElement('div');
                    cell.className = 'cell cell-off track-cell';
                    var link = document.createElement('a');
                    link.className = 'cell-link';
                    link.href = '#';
                    var span = document.createElement('span');
                    link.appendChild(span);
                    cell.appendChild(link);

                    var tIdx = trackIndexMap[key];
                    (function(posIdx) {
                        link.addEventListener('click', function(e) {
                            e.preventDefault();
                            var pool = toruses[currentCycle];
                            currentIndex = (currentIndex + 1 + posIdx) % pool.length;
                            updateDisplay();
                        });
                    })(tIdx);

                    trackCells[tIdx] = { el: cell, link: link, span: span };
                    grid.appendChild(cell);
                    continue;
                }

                var cell = document.createElement('div');
                cell.className = 'cell cell-on';
                if (edgeIdx < currentEdgeArticles.length) {
                    var link = document.createElement('a');
                    link.className = 'cell-link';
                    link.href = currentEdgeArticles[edgeIdx].u;
                    link.innerHTML = '<span>' + getEdgeLabel(currentEdgeArticles[edgeIdx]) + '</span>';
                    cell.appendChild(link);
                    edgeIdx++;
                }
                edgeCells.push(cell);
                grid.appendChild(cell);
            }
        }

        updateTrackContent();
        updateHash();
    }

    // ── Navigation ────────────────────────────────────
    function cyclePrev() {
        var pool = toruses[currentCycle];
        currentIndex = (currentIndex - 1 + pool.length) % pool.length;
        updateDisplay();
    }

    function cycleNext() {
        var pool = toruses[currentCycle];
        currentIndex = (currentIndex + 1) % pool.length;
        updateDisplay();
    }

    function escapeToWildcard() {
        var target = wildcardQuip;
        currentCycle = target.cycle;
        currentIndex = toruses[currentCycle].indexOf(target);
        wildcardQuip = pickWildcard();
        updateDisplay();
    }

    // ── Keyboard ──────────────────────────────────────
    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowUp' || e.key === 'ArrowRight') { e.preventDefault(); cycleNext(); }
        if (e.key === 'ArrowDown' || e.key === 'ArrowLeft') { e.preventDefault(); cyclePrev(); }
        if (e.key === ' ') { e.preventDefault(); escapeToWildcard(); }
    });

    // ── Touch swipe ───────────────────────────────────
    var touchStartX, touchStartY;
    grid.addEventListener('touchstart', function(e) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, { passive: true });

    grid.addEventListener('touchend', function(e) {
        var dx = e.changedTouches[0].clientX - touchStartX;
        var dy = e.changedTouches[0].clientY - touchStartY;
        var absDx = Math.abs(dx);
        var absDy = Math.abs(dy);
        if (Math.max(absDx, absDy) < 40) return;

        if (absDy > absDx) {
            if (dy < 0) cycleNext();   // swipe up = forward
            else cyclePrev();           // swipe down = backward
        } else {
            if (dx > 0) escapeToWildcard(); // swipe right = escape
            else cyclePrev();               // swipe left = backward
        }
    }, { passive: true });

    // ── Responsive labels ────────────────────────────
    mobileQuery.addEventListener('change', function() {
        updateTrackContent();
        edgeCells.forEach(function(cell, i) {
            var link = cell.querySelector('.cell-link');
            if (link && i < currentEdgeArticles.length) {
                link.querySelector('span').textContent = getEdgeLabel(currentEdgeArticles[i]);
            }
        });
    });

    // ── Init ──────────────────────────────────────────
    buildGrid();
    buildMinimap();
})();
</script>
