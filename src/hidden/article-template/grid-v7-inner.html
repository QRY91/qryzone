---
layout: base.njk
title: "Grid v7 — Inner Square"
description: 8x8 logo grid with L-shaped inner container and pocket
extraStyles: |
  <link rel="stylesheet" href="/assets/css/article-logo.css">
---

<style>
.logo-grid {
    max-width: 800px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    gap: 3px;
    padding: 0 var(--space-md);
    aspect-ratio: 1 / 1;
}

.cell {
    border-radius: var(--border-radius);
    position: relative;
    overflow: hidden;
    min-width: 0;
}

.cell-on { background: #333333; }
.cell-off { background: transparent; }

.cell-link {
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 0.65rem;
    font-family: var(--font-mono);
    text-align: center;
    padding: var(--space-xs);
    line-height: 1.2;
    width: 100%;
    height: 100%;
    transition: color 0.2s;
}

.cell-on .cell-link { color: #555555; }
.cell-on .cell-link:hover { color: var(--color-accent); text-decoration: none; }
.cell-off .cell-link { color: var(--color-text-secondary); }
.cell-off .cell-link:hover { color: var(--color-accent); text-decoration: none; }

.cell-link span {
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* ── The Pocket: 2x2 merged ──────────────────────────── */
.pocket {
    grid-column: 6 / 8;
    grid-row: 6 / 8;
    background: var(--color-background, #3f3f3f);
    z-index: 1;
    border: 1px solid var(--color-border);
    border-radius: var(--border-radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--color-accent);
    text-align: center;
    padding: var(--space-sm);
    line-height: 1.3;
    transition: border-color 0.2s;
}

.pocket:hover {
    border-color: var(--color-accent);
}

/* ── Inner Square: 4x4 with bottom-right corner cut ── */
/* Rows 2-5, cols 2-5 (0-indexed) = grid lines 3-7 */
/* Clip out the bottom-right cell (where pocket's corner goes) */
.inner-square {
    grid-column: 3 / 7;
    grid-row: 3 / 7;
    border: 1px solid var(--color-border);
    border-radius: var(--border-radius);
    padding: var(--space-md);
    font-family: var(--font-sans);
    font-size: 0.8rem;
    color: var(--color-text-primary);
    line-height: 1.6;
    text-align: left;
    overflow-y: auto;
    /* Bottom-right corner is covered by the pocket grid element */
    scrollbar-width: thin;
    scrollbar-color: var(--color-border) transparent;
}

/* Float-based L-wrap: pusher forces spacer to bottom-right */
.corner-pusher {
    float: right;
    width: 0;
    height: 75%;
}

.corner-spacer {
    float: right;
    clear: right;
    width: 25%;
    height: 25%;
}

.inner-content h2 {
    font-family: var(--font-mono);
    font-size: 0.9rem;
    color: var(--color-accent);
    margin-bottom: var(--space-sm);
}

.inner-content p {
    margin-bottom: var(--space-sm);
    font-size: 0.75rem;
    color: var(--color-text-secondary);
}
</style>

<div class="logo-grid" id="logoGrid"></div>

<script>
(function() {
    const LOGO = [
        0b11111111,
        0b10000001,
        0b10111101,
        0b10111101,
        0b10111111,
        0b10111001,
        0b10001001,
        0b11111111
    ];

    const articles = [
        { t: 'sailboat test', u: '/sailboat-test/' },
        { t: 'CLI-first', u: '/cli-first-development/' },
        { t: 'hack my claw', u: '/hack-my-claw/' },
        { t: 'errata', u: '/errata/' },
        { t: 'logo design', u: '/logo-design/' },
        { t: 'convergent evolution', u: '/convergent-evolution-personal-ai/' },
        { t: 'de-slopping', u: '/antislop-editorial/' },
        { t: 'steampunk eng.', u: '/steampunk-engineering/' },
        { t: '250MB spinner', u: '/250mb-spinner/' },
        { t: 'SIMP protocol', u: '/simp-protocol/' },
        { t: 'it-smash', u: '/it-smash/' },
        { t: 'styleguide', u: '/styleguide/' },
        { t: '58 keys', u: '/58-keys-then-1/' },
        { t: 'hyperresponder', u: '/ai-hyperresponder/' },
        { t: 'atkinson', u: '/atkinson-hyperlegible/' },
        { t: 'CLI stack', u: '/cli-tooling-stack/' },
        { t: 'cloud treadmill', u: '/cloud-ai-treadmill/' },
        { t: 'db-first debug', u: '/database-first-debugging/' },
        { t: 'disassemble', u: '/disassemble-recombine/' },
        { t: 'distilling style', u: '/distilling-style/' },
        { t: 'doug demon', u: '/doug-demon-core/' },
        { t: 'economic honesty', u: '/economic-honesty/' },
        { t: 'gradient descent', u: '/greatest-hits-through-gradient-descent/' },
        { t: 'write a zine', u: '/how-to-write-a-zine/' },
        { t: 'learning to spite', u: '/learning-to-spite/' },
        { t: 'lily58 gaming', u: '/lily58-gaming/' },
        { t: 'living workshop', u: '/living-workshop/' },
        { t: 'local AI econ', u: '/local-ai-economics/' },
        { t: 'managing attention', u: '/managing-attention/' },
        { t: 'RPi digest', u: '/minimal-steampunk-poc/' },
        { t: 'NixOS', u: '/nixos-on-framework/' },
        { t: 'off the deep end', u: '/off-the-deep-end/' },
        { t: 'remove to optimize', u: '/optimization-through-removal/' },
        { t: 'overnight AI', u: '/overnight-ai-development/' },
        { t: 'panopticron', u: '/panopticron/' },
        { t: 'microstudio', u: '/permacomputing-microstudio/' },
        { t: 'powers for good', u: '/powers-for-good/' },
        { t: 'productivity', u: '/productivity-breakthrough/' },
        { t: 'qrazy', u: '/qrazy/' },
        { t: 'recursive mirror', u: '/recursive-mirror/' },
        { t: 'slopsquid', u: '/slopsquid-technical-preset/' },
        { t: 'brainfarts', u: '/social-media-brainfarts/' },
        { t: 'UX challenges', u: '/ux-challenges/' },
        { t: 'thinking', u: '/what-does-thinking-look-like/' },
        { t: 'what I can do', u: '/what-i-can-actually-do/' },
        { t: 'zenburn', u: '/zenburn-theme/' },
        { t: 'about', u: '/about/' },
        { t: 'QUBIQ', u: '/fun/qubiq/' },
        { t: 'boids', u: '/fun/boids/' },
        { t: 'game of life', u: '/fun/game-of-life/' },
        { t: 'attractors', u: '/fun/attractors/' },
        { t: 'mandelbrot', u: '/fun/mandelbrot/' },
        { t: 'flowfield', u: '/fun/flowfield/' },
        { t: 'wave tank', u: '/fun/wave-tank/' },
        { t: 'ascii logo', u: '/fun/ascii-logo/' },
        { t: 'logo math', u: '/fun/logo-math/' },
        { t: 'ditherpunk', u: '/fun/ditherpunk/' },
        { t: 'lenia', u: '/fun/lenia/' },
        { t: 'L-systems', u: '/fun/l-systems/' },
        { t: 'maze', u: '/fun/maze/' },
        { t: 'sorting', u: '/fun/sorting/' },
        { t: 'turtle', u: '/fun/turtle/' },
        { t: 'music box', u: '/fun/music-box/' },
    ];

    for (let i = articles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [articles[i], articles[j]] = [articles[j], articles[i]];
    }

    // Cells claimed by containers — skip these in the loop
    // Inner square: rows 2-5, cols 2-5 (16 cells)
    // Pocket: rows 5-6, cols 5-6 (4 cells)
    // But (5,5) is in BOTH — it belongs to the pocket (the cut corner)
    // So inner square claims 15 cells, pocket claims 4
    const innerCells = new Set();
    for (let r = 2; r <= 5; r++) {
        for (let c = 2; c <= 5; c++) {
            if (r === 5 && c === 5) continue; // belongs to pocket
            innerCells.add(r + ',' + c);
        }
    }

    const pocketCells = new Set(['5,5', '5,6', '6,5', '6,6']);

    const claimed = new Set([...innerCells, ...pocketCells]);

    const grid = document.getElementById('logoGrid');
    let idx = 0;
    let innerInserted = false;
    let pocketInserted = false;

    for (let y = 0; y < 8; y++) {
        for (let x = 0; x < 8; x++) {
            const key = y + ',' + x;

            // Insert inner square at its first cell
            if (innerCells.has(key) && !innerInserted) {
                const inner = document.createElement('div');
                inner.className = 'inner-square';
                inner.innerHTML = '<div class="corner-pusher"></div>' +
                    '<div class="corner-spacer"></div>' +
                    '<h2>The sailboat test</h2>' +
                    '<p>Hundred Rabbits live and work on a sailboat. 51-day Pacific crossings without reliable internet. Power budgets measured in solar watts. Everything they build has to work in those conditions.</p>' +
                    '<p>This creates a brutal filter. If a tool requires cloud APIs, constant connectivity, or more power than a solar panel provides — it doesn\'t work. It\'s not a theoretical limitation. It\'s Tuesday.</p>' +
                    '<p>Will this still run in 50 years? Can I fix it myself? Does it require an empire to maintain? Will this still work if the internet goes down?</p>' +
                    '<p>Most modern software fails this test immediately. SaaS, cloud APIs, subscription services — all gone when the connectivity is. But your core tools? The ones you think with? Those should work on a sailboat.</p>';
                grid.appendChild(inner);
                innerInserted = true;
                continue;
            }

            // Insert pocket at its first cell
            if (pocketCells.has(key) && !pocketInserted) {
                const pocket = document.createElement('div');
                pocket.className = 'pocket';
                pocket.textContent = '"does it work on a boat?"';
                grid.appendChild(pocket);
                pocketInserted = true;
                continue;
            }

            // Skip remaining claimed cells
            if (claimed.has(key)) continue;

            const bit = (LOGO[y] >> (7 - x)) & 1;
            const cell = document.createElement('div');
            cell.className = 'cell ' + (bit ? 'cell-on' : 'cell-off');

            if (idx < articles.length) {
                const link = document.createElement('a');
                link.className = 'cell-link';
                link.href = articles[idx].u;
                link.innerHTML = '<span>' + articles[idx].t + '</span>';
                cell.appendChild(link);
                idx++;
            }

            grid.appendChild(cell);
        }
    }
})();
</script>
