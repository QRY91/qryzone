<style>
.logo-grid {
    max-width: 800px;
    width: 100%;
    aspect-ratio: 1 / 1;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    gap: 3px;
    padding: 0 var(--space-md);
    overflow: hidden;
}

.cell {
    border-radius: var(--border-radius);
    position: relative;
    overflow: hidden;
    min-width: 0;
}

.cell-on { background: #333333; }
.cell-off { background: transparent; }

.cell-link {
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 0.65rem;
    font-family: var(--font-mono);
    text-align: center;
    padding: var(--space-xs);
    line-height: 1.2;
    width: 100%;
    height: 100%;
    transition: color 0.2s, background 0.2s;
}

.cell-on .cell-link { color: #555555; }
.cell-on .cell-link:hover { color: var(--color-accent); text-decoration: none; }
.cell-off .cell-link { color: var(--color-text-secondary); }
.cell-off .cell-link:hover { color: var(--color-accent); text-decoration: none; }

.cell-link span {
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* ── Inner Square: L-shaped content area ─────────── */
.inner-square {
    grid-column: 3 / 7;
    grid-row: 3 / 7;
    background: #333333;
    border: 1px solid var(--color-border);
    border-radius: var(--border-radius);
    padding: var(--space-md);
    font-family: var(--font-sans);
    font-size: 0.8rem;
    color: var(--color-text-primary);
    line-height: 1.6;
    text-align: left;
    overflow: hidden;
    min-height: 0;
    min-width: 0;
}

/* Float-based L-wrap: pusher forces spacer to bottom-right */
.corner-pusher {
    float: right;
    width: 0;
    height: 75%;
}

.corner-spacer {
    float: right;
    clear: right;
    width: 25%;
    height: 25%;
}

.inner-square h2 {
    font-family: var(--font-mono);
    font-size: 0.9rem;
    color: #f0dfaf;
    margin-bottom: 2px;
}

.inner-square h2 a {
    color: #f0dfaf;
    text-decoration: none;
    transition: color 0.2s;
}

.inner-square h2 a:hover {
    color: var(--color-accent);
}

.inner-square p {
    margin-bottom: var(--space-sm);
    font-size: 0.75rem;
    color: #dcdccc;
}

.inner-square p:last-child {
    margin-bottom: 0;
}

.inner-square pre {
    background: #2a2a2a;
    border: 1px solid var(--color-border);
    border-radius: var(--border-radius);
    padding: var(--space-sm);
    font-family: var(--font-mono);
    font-size: 0.65rem;
    line-height: 1.5;
    color: #dcdccc;
    overflow-x: hidden;
    margin-bottom: var(--space-sm);
    white-space: pre-wrap;
    word-break: break-all;
}

.inner-square pre .comment { color: #7f9f7f; }
.inner-square pre .keyword { color: #f0dfaf; }
.inner-square pre .string { color: #cc9393; }
.inner-square pre .fn { color: #93e0e3; }

.inner-square ul {
    margin: 0 0 var(--space-sm) var(--space-md);
    padding: 0;
    font-size: 0.75rem;
    color: #dcdccc;
    line-height: 1.6;
}

.inner-square li {
    margin-bottom: 2px;
}

.inner-square .quip-type {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: #7f9f7f;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 2px;
}

/* Position dots */
.position-dots {
    font-size: 0.5rem;
    color: #555;
    margin-bottom: var(--space-sm);
    letter-spacing: 0.1em;
    line-height: 1;
}

/* Fade transition for quip swaps */
.inner-square.fading {
    opacity: 0;
    transition: opacity 0.15s ease-out;
}

.inner-square.visible {
    opacity: 1;
    transition: opacity 0.2s ease-in;
}

/* ── The Pocket: escape hatch ────────────────────── */
.pocket {
    grid-column: 6 / 8;
    grid-row: 6 / 8;
    background: var(--color-background, #3f3f3f);
    z-index: 1;
    border: 1px solid var(--color-border);
    border-radius: var(--border-radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--color-accent);
    text-align: center;
    padding: var(--space-sm);
    line-height: 1.4;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, font-size 0.2s;
    user-select: none;
}

.pocket:hover {
    border-color: var(--color-accent);
    background: #353535;
}

.pocket:active {
    background: #2a2a2a;
}

/* ── Nav chevrons ────────────────────────────────── */
.nav-chevron {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    background: none;
    border: none;
    font-size: 0.8rem;
    color: #555;
    cursor: pointer;
    transition: color 0.2s;
    user-select: none;
    font-family: var(--font-mono);
    padding: 0;
}

.nav-chevron:hover {
    color: var(--color-accent);
}

.nav-chevron:active {
    color: #fff;
}
</style>

        var innerInserted = false;
        var pocketInserted = false;

        for (var y = 0; y < 8; y++) {
            for (var x = 0; x < 8; x++) {
                var key = y + ',' + x;

                // Inner square (first cell triggers insertion)
                if (innerCells.has(key) && !innerInserted) {
                    innerEl = document.createElement('div');
                    innerEl.className = 'inner-square visible';
                    renderQuipContent(innerEl, quip);
                    grid.appendChild(innerEl);
                    innerInserted = true;
                    continue;
                }

                // Pocket (first cell triggers insertion)
                if (pocketCells.has(key) && !pocketInserted) {
                    pocketEl = document.createElement('div');
                    pocketEl.className = 'pocket';
                    pocketEl.textContent = wildcardQuip.pocket;
                    pocketEl.addEventListener('click', escapeToWildcard);
                    pocketEl.addEventListener('mouseenter', function() {
                        pocketHovered = true;
                        pocketEl.textContent = '\u2192 ' + wildcardQuip.title;
                    });
                    pocketEl.addEventListener('mouseleave', function() {
                        pocketHovered = false;
                        pocketEl.textContent = wildcardQuip.pocket;
                    });
                    grid.appendChild(pocketEl);
                    pocketInserted = true;
                    continue;
                }

                // Nav chevron cells
                if (navPositions[key]) {
                    var navType = navPositions[key];
                    var cell = document.createElement('div');
                    cell.className = 'cell cell-on';
                    var btn = document.createElement('button');
                    btn.className = 'nav-chevron';
                    btn.textContent = navType === 'up' ? '\u25b2' : '\u25c0';
                    btn.setAttribute('aria-label', navType === 'up' ? 'Previous quip' : 'Next quip');
                    btn.addEventListener('click', navType === 'up' ? cyclePrev : cycleNext);
                    cell.appendChild(btn);
                    grid.appendChild(cell);
                    continue;
                }

                // Skip remaining claimed cells
                if (claimed.has(key)) continue;

                // Regular edge cells — random articles
                var bit = (LOGO[y] >> (7 - x)) & 1;
                var cell = document.createElement('div');
                cell.className = 'cell ' + (bit ? 'cell-on' : 'cell-off');

                if (idx < edgeArticles.length) {
                    var link = document.createElement('a');
                    link.className = 'cell-link';
                    link.href = edgeArticles[idx].u;
                    link.innerHTML = '<span>' + edgeArticles[idx].t + '</span>';
                    cell.appendChild(link);
                    idx++;
                }

                edgeCells.push(cell);
                grid.appendChild(cell);
            }
        }
    }

    function updateDisplay() {
        var quip = getCurrentQuip();

        // Fade out
        innerEl.classList.remove('visible');
        innerEl.classList.add('fading');

        setTimeout(function() {
            // Swap content
            renderQuipContent(innerEl, quip);

            // Update pocket
            if (pocketHovered) {
                pocketEl.textContent = '\u2192 ' + wildcardQuip.title;
            } else {
                pocketEl.textContent = wildcardQuip.pocket;
            }

            // Reshuffle edge articles
            var edgeArticles = shuffle(articles);
            edgeCells.forEach(function(cell, i) {
                var link = cell.querySelector('.cell-link');
                if (link && i < edgeArticles.length) {
                    link.href = edgeArticles[i].u;
                    link.querySelector('span').textContent = edgeArticles[i].t;
                }
            });

            // Fade in
            innerEl.classList.remove('fading');
            innerEl.classList.add('visible');
        }, 150);
    }

    // ── Navigation ────────────────────────────────────
    function cyclePrev() {
        var pool = toruses[currentCycle];
        currentIndex = (currentIndex - 1 + pool.length) % pool.length;
        updateDisplay();
    }

    function cycleNext() {
        var pool = toruses[currentCycle];
        currentIndex = (currentIndex + 1) % pool.length;
        updateDisplay();
    }

    function escapeToWildcard() {
        var target = wildcardQuip;
        currentCycle = target.cycle;
        currentIndex = toruses[currentCycle].indexOf(target);
        wildcardQuip = pickWildcard();
        updateDisplay();
    }

    // ── Keyboard navigation ───────────────────────────
    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowUp') { e.preventDefault(); cyclePrev(); }
        if (e.key === 'ArrowDown') { e.preventDefault(); cycleNext(); }
        if (e.key === 'ArrowLeft') { e.preventDefault(); cycleNext(); }
        if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); escapeToWildcard(); }
    });

    // ── Init ──────────────────────────────────────────
    buildGrid();
})();
</script>
