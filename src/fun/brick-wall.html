        }

        @media (max-width: 600px) {

<body>
    <a href="/fun/" class="back-link">← back</a>

    <div id="wall"></div>

    <div class="title-overlay">
        <h1>Like Talking to a Brick Wall</h1>
        <p>scroll for more</p>
    </div>

    <script>
    (function() {
        const DEFLECTIONS = [
            "It is what it is",
            "Let's agree to disagree",
            "I hear you, but…",
            "That's just how things are",
            "You're overthinking it",
            "Calm down",
            "It's not that deep",
            "I never said that",
            "You always do this",
            "Whatever you say",
            "Sure, fine",
            "I don't want to talk about it",
            "Can we not do this right now",
            "That's not what I meant",
            "You're being dramatic",
            "I was just joking",
            "It's not a big deal",
            "You're too sensitive",
            "Let's move on",
            "I already said sorry",
            "What do you want me to say",
            "I don't know what to tell you",
            "I'm sorry you feel that way",
            "That's your opinion",
            "I don't remember that",
            "Everyone does it",
            "You're reading into it",
            "Let's not go there",
            "This isn't productive",
            "I think we're done here",
            "I don't have time for this",
            "It could be worse",
            "Other people have it harder",
            "You're making a mountain out of a molehill",
            "I didn't mean it like that",
            "Why are you bringing this up now",
            "That was a long time ago",
            "It's not my fault",
            "I did my best",
            "Nobody's perfect",
            "At least I tried",
            "You wouldn't understand",
            "It's complicated",
            "I don't owe you an explanation",
            "You're putting words in my mouth",
            "I don't see the problem",
            "We've been over this",
            "What's done is done",
            "Can we just drop it",
            "Fine, you're right, happy?",
            "I'm just being honest",
            "Someone had to say it",
            "No offense, but…",
            "I'm just playing devil's advocate",
            "Both sides have a point",
            "Let's not make this a thing",
            "That's above my pay grade",
            "It's not my problem",
            "I'll think about it",
            "We'll see",
            "Maybe",
            "If you say so",
            "Sure, whatever",
            "Noted",
            "Interesting",
            "Cool",
            "Look",
            "Listen",
            "Here's the thing",
            "With all due respect",
            "That's just my personality",
            "People are too PC these days",
            "I was raised different",
            "That's the way we've always done it",
            "If it ain't broke",
            "I'm just being real",
            "Let's be rational about this",
            "You're being emotional",
            "Nothing personal",
            "It's just business",
            "Per my last email",
            "As previously discussed",
            "Going forward",
            "Let's take this offline",
            "Let's circle back",
            "That's a great question",
            "Sounds good",
            "New phone who dis",
            "I don't recall",
            "That's not my recollection",
            "I plead the fifth",
            "No comment",
            "It depends on what you mean",
            "Mistakes were made",
            "I take full responsibility",
            "We're looking into it",
            "Lessons were learned",
            "I appreciate your concern",
            "I'll get back to you on that",
            "That's one way to look at it",
            "You're not wrong",
            "I mean, technically…",
            "To be fair",
        ];

        const BRICK_COLORS = [
            '#a0522d', '#8b4513', '#a45a3d', '#b5573a',
            '#9c4a2f', '#8e4433', '#a25038', '#b06040',
            '#994430', '#7d3a28', '#ae5535', '#a34d32',
            '#925040', '#884838', '#9e5842', '#a8604a',
        ];

        const wall = document.getElementById('wall');
        let usedIndices = new Set();
        let scrollY = 0;
        let rowCount = 0;

        // Sizing — recalculated on resize
        let brickW, brickH, gap, rowH;

        function calcSizes() {
            if (window.innerWidth <= 600) {
                brickW = 120; brickH = 40; gap = 3;
            } else {
                brickW = 156; brickH = 52; gap = 4;
            }
            rowH = brickH + gap;
        }

        function pickDeflection() {
            if (usedIndices.size >= DEFLECTIONS.length) usedIndices.clear();
            let idx;
            do { idx = Math.floor(Math.random() * DEFLECTIONS.length); } while (usedIndices.has(idx));
            usedIndices.add(idx);
            return DEFLECTIONS[idx];
        }

        function pickColor() {
            return BRICK_COLORS[Math.floor(Math.random() * BRICK_COLORS.length)];
        }

        function makeBrick(w, withText) {
            const el = document.createElement('div');
            el.className = 'brick';
            el.style.width = w + 'px';
            el.style.height = brickH + 'px';
            el.style.backgroundColor = pickColor();
            if (withText) el.textContent = pickDeflection();
            return el;
        }

        function makeRow(isOffset) {
            const row = document.createElement('div');
            row.className = 'brick-row';
            row.style.height = brickH + 'px';
            row.style.marginBottom = gap + 'px';
            row.style.gap = gap + 'px';

            const viewW = window.innerWidth;
            const halfW = Math.floor(brickW / 2);

            if (isOffset) {
                row.appendChild(makeBrick(halfW, false));
                const afterHalf = halfW + gap;
                const fullSlots = Math.ceil((viewW - afterHalf) / (brickW + gap)) + 1;
                for (let i = 0; i < fullSlots; i++) row.appendChild(makeBrick(brickW, true));
                row.appendChild(makeBrick(halfW, false));
            } else {
                const count = Math.ceil(viewW / (brickW + gap)) + 1;
                for (let i = 0; i < count; i++) row.appendChild(makeBrick(brickW, true));
            }
            return row;
        }

        function addRows(n) {
            for (let i = 0; i < n; i++) {
                wall.appendChild(makeRow(rowCount % 2 === 1));
                rowCount++;
            }
        }

        function ensureRows() {
            const wallHeight = rowCount * rowH;
            const needed = window.innerHeight + rowH * 8;
            while (wallHeight - scrollY < needed + rowH * 5) {
                addRows(5);
                break;
            }
            // More precise check
            while (rowCount * rowH - scrollY < needed) {
                addRows(1);
            }
        }

        function cleanup() {
            const rowsAbove = Math.floor(scrollY / rowH);
            if (rowsAbove > 50) {
                const remove = rowsAbove - 20;
                for (let i = 0; i < remove && wall.firstChild; i++) {
                    wall.removeChild(wall.firstChild);
                }
                rowCount -= remove;
                scrollY -= remove * rowH;
            }
        }

        function applyScroll() {
            wall.style.transform = 'translateX(-50%) translateY(' + (-scrollY) + 'px)';
        }

        function buildWall() {
            wall.innerHTML = '';
            rowCount = 0;
            scrollY = 0;
            usedIndices.clear();
            calcSizes();
            const rowsNeeded = Math.ceil(window.innerHeight / rowH) + 10;
            addRows(rowsNeeded);
            applyScroll();
        }

        // Auto-scroll
        const autoSpeed = 0.3; // px per frame

        function tick() {
            scrollY += autoSpeed;
            if (scrollY < 0) scrollY = 0;
            ensureRows();
            cleanup();
            applyScroll();
            requestAnimationFrame(tick);
        }

        // Wheel scroll
        window.addEventListener('wheel', (e) => {
            scrollY += e.deltaY * 0.5;
            if (scrollY < 0) scrollY = 0;
            ensureRows();
            e.preventDefault();
        }, { passive: false });

        // Touch scroll
        let touchY = 0;
        window.addEventListener('touchstart', (e) => {
            touchY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            const dy = touchY - e.touches[0].clientY;
            touchY = e.touches[0].clientY;
            scrollY += dy;
            if (scrollY < 0) scrollY = 0;
            ensureRows();
            e.preventDefault();
        }, { passive: false });

        // Resize
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(buildWall, 300);
        });

        // Go
        buildWall();
        requestAnimationFrame(tick);
    })();
    </script>
</body>
